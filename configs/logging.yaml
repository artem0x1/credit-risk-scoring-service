version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(filename)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/app.log
    encoding: utf-8

loggers:
  src:
    level: DEBUG
    handlers:
      - console
      - file
    propagate: false

  api:
    level: INFO
    handlers:
      - console
      - file
    propagate: false

  scripts:
    level: INFO
    handlers:
      - console
      - file
    propagate: false

root:
  level: INFO
  handlers:
    - console
    - file